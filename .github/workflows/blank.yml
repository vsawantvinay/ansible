name: Test GHA
on: 
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build
        run: echo " This is build"
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test
        run: echo " This is test stage"
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: deploy
        run: echo " this is deploy stage"
