name: input practice
on:
  workflow_dispatch:
    inputs:
      environments:
        description: choose env
        required: true
        type: choice
        options:
          - dev
          - qa
          - test
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: echo
        run: |
          set -x
          echo "workflow is running on evn ${{ inputs.environments }}"
