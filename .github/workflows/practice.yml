name: Practice on context workflow
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: echo statement
        run: |
            echo "This workflow is being ran by user ${{ github.actor }}"
            echo " This repository is ${{ github.repository }}"
            echo " This repo's branch is ${{ github.ref_name }}"
        
