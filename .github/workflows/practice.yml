name: Full Practice
on: workflow_dispatch
jobs:
  echo:
    runs-on: ubuntu-slim
    steps:
      - name: echo default GHA variables
        run: |
            set +x
            echo "This workflow is ran by user ${{ github.actor }}"
            echo "this repo is ${{ github.repository }}"
            echo "This repos brnach is ${{ github.ref_name }}"
  Git:
    runs-on: ubuntu-latest
    needs: echo
    steps:
      - name: git checkout
        uses: actions/checkout@v7
      - name: cat file
        run: cat test.txt
  Finale:
    runs-on: ubuntu-latest
    needs: Git
    steps:
      - name: echo final stage
        run: echo " All stage successful"

      - name: print all github variables
        run: echo "${{ toJson(github) }}"

      - name: print all github vairbles
        run: printenv | sortGITHUB_SHA

      - name: print gitsha
        run: echo sha value is $GITHUB_SHA
      
